name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  windows-release:
    name: Build and publish Windows release
    runs-on: windows-latest
    timeout-minutes: 75

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-
            ${{ runner.os }}-cargo-

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Run frontend unit and integration tests
        run: npm run test

      - name: Run Playwright E2E tests
        run: npm run test:e2e

      - name: Run Rust and Tauri tests
        working-directory: src-tauri
        run: cargo test

      - name: Build Tauri desktop app
        run: npm run tauri:build

      - name: Collect release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release-assets | Out-Null
          Copy-Item src-tauri/target/release/totline.exe release-assets/totline.exe
          Copy-Item src-tauri/target/release/bundle/nsis/*.exe release-assets/
          Copy-Item src-tauri/target/release/bundle/msi/*.msi release-assets/
          Get-ChildItem release-assets

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $assets = Get-ChildItem release-assets -File | ForEach-Object { $_.FullName }
          gh release create "${{ github.ref_name }}" $assets `
            --title "TOTLINE ${{ github.ref_name }}" `
            --notes "Automated Windows release for TOTLINE ${{ github.ref_name }}." `
            --verify-tag
